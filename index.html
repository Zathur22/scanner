<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Scan Soundwave Card</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0e;--surface:#161616;--border:#272727;
  --text:#f0ece6;--muted:#555;--gold:#c9a84c;--gold-dim:rgba(201,168,76,0.08);
  --green:#4caf7d;--red:#e05555;
}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0}

/* Header */
.hdr{width:100%;padding:18px 20px 14px;border-bottom:1px solid var(--border);text-align:center;background:var(--surface)}
.hdr-label{font-size:9px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:3px}
.hdr-title{font-size:19px;font-weight:normal;font-family:Georgia,serif}

/* Scanner */
.scanner-section{width:100%;max-width:520px;padding:20px 16px}

.cam-wrap{
  position:relative;background:#000;border-radius:4px;overflow:hidden;
  aspect-ratio:4/3;width:100%;margin-bottom:16px;border:1px solid var(--border)
}
#video{width:100%;height:100%;object-fit:cover;display:block}

/* Scanning reticle */
.reticle{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.ret-inner{width:92%;max-width:450px;aspect-ratio:16/6;position:relative}
.ret-inner::before,.ret-inner::after,.rc-br,.rc-bl{content:'';position:absolute;width:26px;height:26px;border-color:var(--gold);border-style:solid}
.ret-inner::before{top:0;left:0;border-width:2px 0 0 2px}
.ret-inner::after {top:0;right:0;border-width:2px 2px 0 0}
.rc-br{bottom:0;right:0;border-width:0 2px 2px 0}
.rc-bl{bottom:0;left:0;border-width:0 0 2px 2px}

/* scan line */
.scan-line{
  position:absolute;left:4px;right:4px;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--gold) 30%,var(--gold) 70%,transparent);
  animation:sl 1.8s ease-in-out infinite;top:0
}
@keyframes sl{
  0%  {top:4px;opacity:0}
  10% {opacity:1}
  90% {opacity:1}
  100%{top:calc(100% - 4px);opacity:0}
}

/* Status */
#status{
  text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px;min-height:18px;transition:color .3s
}
#status.scanning{color:var(--gold)}
#status.found   {color:var(--green)}
#status.error   {color:var(--red)}

.hint-guide{
  background:var(--surface);border:1px solid var(--border);border-radius:3px;
  padding:14px 16px;font-size:10px;color:var(--muted);letter-spacing:.5px;line-height:2;
  margin-bottom:16px
}
.hint-guide b{color:var(--text)}

/* Start button */
#startBtn{
  width:100%;padding:14px;background:var(--gold);color:#000;border:none;
  font-family:'Courier New',monospace;font-size:12px;letter-spacing:3px;
  text-transform:uppercase;border-radius:3px;cursor:pointer;margin-bottom:8px;transition: background 0.3s;
}
#startBtn:hover{opacity:.85}

/* ── PLAYER ── */
#player{display:none;width:100%;max-width:520px;padding:0 16px 32px}

.player-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:28px 24px;text-align:center}

.p-wave{width:100%;height:64px;display:block;margin-bottom:22px;border-radius:2px}

.p-name{font-family:Georgia,serif;font-size:20px;font-weight:normal;color:var(--text);margin-bottom:4px}
.p-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}

/* Diagnostic Window */
.p-debug{font-size:11px;color:#e05555;margin-bottom:20px;min-height:14px;letter-spacing:0.5px;}

.play-btn{
  width:60px;height:60px;border-radius:50%;background:var(--gold);border:none;
  cursor:pointer;font-size:22px;display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:20px;transition:transform .1s;color:#000
}
.play-btn:hover{transform:scale(1.06)}

.prog-wrap{width:100%;height:4px;background:var(--border);border-radius:2px;margin-bottom:8px;cursor:pointer;position:relative}
.prog-fill{height:100%;background:var(--gold);border-radius:2px;width:0%;transition:width .1s linear}
.time-row{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:20px}

#scanAgain{
  padding:10px 24px;background:transparent;border:1px solid var(--border);color:var(--text);
  font-family:'Courier New',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;
  border-radius:2px;cursor:pointer
}
#scanAgain:hover{border-color:var(--gold);color:var(--gold)}

/* hidden canvas */
#snap{display:none}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-label">Soundwave</div>
  <div class="hdr-title">Card Scanner</div>
</div>

<div class="scanner-section" id="scanUI">

  <div class="hint-guide">
    <b>How to scan:</b><br>
    Hold your waveform card flat in good light.<br>
    Keep steady — it reads automatically (or tap to snap a photo if blocked).
  </div>

  <div id="status">Ready</div>

  <div class="cam-wrap">
    <video id="video" autoplay muted playsinline webkit-playsinline></video>
    <div class="reticle">
      <div class="ret-inner">
        <div class="rc-br"></div>
        <div class="rc-bl"></div>
        <div class="scan-line" id="scanLine"></div>
      </div>
    </div>
  </div>

  <button id="startBtn" onclick="startCamera()">Start Camera</button>
  
  <input type="file" id="fallbackInput" accept="image/*" capture="environment" style="display:none" onchange="processFallbackImage(event)">

  <div style="font-size:10px;color:var(--muted);text-align:center;letter-spacing:1px; margin-top:10px;">Works best in bright, even light</div>
</div>

<div id="player">
  <div class="player-card">
    <canvas class="p-wave" id="pWave"></canvas>
    <div class="p-name" id="pName">—</div>
    <div class="p-sub">Soundwave Card</div>
    <div class="p-debug" id="pDebug"></div>
    <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
    <div class="prog-wrap" id="progWrap" onclick="seek(event)">
      <div class="prog-fill" id="progFill"></div>
    </div>
    <div class="time-row"><span id="tCur">0:00</span><span id="tDur">0:00</span></div>
    <button id="scanAgain" onclick="resetScanner()">Scan Another Card</button>
  </div>
</div>

<canvas id="snap"></canvas>
<audio id="nativeAudio" playsinline></audio>

<script>
const APP_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxpI-hW4R-u8xP52sIyzIU0e1abWEIK-29ohOTBkZsH6Nvh_VqwOo4lGkXRol95byeB/exec";

// ── V2 waveform code — must match creator.html exactly ──
const ENC_HIGH = 1.00;
const ENC_LOW  = 0.32;
const BIT_THRESHOLD = 0.64;

const START_POS = [4,5,6,7,8,9];
const START_PATTERN = [1,0,1,0,1,1];

const ID1_POS = [14,18,22,26,30,34,38,42];

const SYNC_POS = [47,48,49,50];
const SYNC_PATTERN = [1,0,0,1];

const ID2_POS = [55,59,63,67,71,75,79,83];

const CHECK_POS = [86,88,90,92];

const END_POS = [94,95,96,97,98,99];
const END_PATTERN = [1,1,0,1,0,1];

const ALL_V2_POSITIONS = [
  ...START_POS,
  ...ID1_POS,
  ...SYNC_POS,
  ...ID2_POS,
  ...CHECK_POS,
  ...END_POS
];

let stream     = null;
let scanTimer  = null;
let audioEl    = null;
let scanning   = false;
let lastId     = -1;
let failCount  = 0;
let validCardIds = [];

const video   = document.getElementById('video');
const snap    = document.getElementById('snap');
const status  = document.getElementById('status');
const startBtn = document.getElementById('startBtn');
const scanLine = document.getElementById('scanLine');
const fallbackInput = document.getElementById('fallbackInput');

// ── Standalone External ID Synchronization ──
// GitHub Pages cannot use google.script.run. The decoder works with the
// full ID range, while the JSONP lookup confirms whether the ID exists.
function loadValidCardIds() {
  validCardIds = [];
  return Promise.resolve(validCardIds);
}

// ── Camera API Integration ──
async function startCamera() {
  setStatus('scanning', 'Initializing sync pipeline...');
  await loadValidCardIds();

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    enableFallback('Browser blocking hardware APIs. Using Photo Mode.');
    return;
  }

  try {
    setStatus('scanning', 'Requesting system permission…');
    const constraints = {
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    };

    stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    await video.play();
    
    setStatus('scanning', 'Scanning…');
    if (scanTimer) clearInterval(scanTimer);
    scanTimer = setInterval(captureAndDecode, 600);

  } catch(e) {
    console.error("Camera block:", e);
    enableFallback('Live camera blocked by browser. Switched to Photo Mode.');
  }
}

function enableFallback(msg) {
  setStatus('error', msg);
  startBtn.textContent = "📷 Tap to Snap Photo";
  startBtn.style.background = "var(--text)"; 
  startBtn.onclick = () => fallbackInput.click();
  scanLine.style.display = 'none';
}

async function processFallbackImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  setStatus('scanning', 'Analyzing image...');
  const img = new Image();
  const url = URL.createObjectURL(file);
  
  img.onload = () => {
    URL.revokeObjectURL(url); 
    snap.width = img.width;
    snap.height = img.height;
    const ctx = snap.getContext('2d');
    ctx.drawImage(img, 0, 0);
    
    let id = decodeGeneratedCardImage(ctx, snap.width, snap.height);
    if (id === null) id = decodeIdFromImage(ctx, snap.width, snap.height);
    
    if(id !== null) {
      lastId = id;
      setStatus('found', 'Card detected — looking up…');
      lookupId(id);
    } else {
      setStatus('error', 'Could not read waveform. Make sure it is flat and well-lit. Try another photo.');
    }
  };
  img.src = url;
}

function stopCamera() {
  if(scanTimer) { clearInterval(scanTimer); scanTimer=null; }
  if(stream){ stream.getTracks().forEach(t => t.stop()); stream=null; }
}

function captureAndDecode() {
  if(!video.videoWidth || scanning) return;
  scanning = true;

  snap.width  = video.videoWidth;
  snap.height = video.videoHeight;
  const ctx = snap.getContext('2d');
  ctx.drawImage(video, 0, 0);

  const id = decodeIdFromImage(ctx, snap.width, snap.height);

  if(id !== null && id !== lastId) {
    lastId = id;
    setStatus('found','Card detected — looking up…');
    stopCamera();
    lookupId(id);
  } else {
    scanning = false;
    failCount++;
    if(failCount > 5) setStatus('scanning','Move back slightly and fit the full waveform inside the large frame');
  }
}

// ── V2 Waveform Decoding ──
// The scanner only accepts a result when:
// 1. START marker is valid
// 2. SYNC marker is valid
// 3. both 8-bit ID copies match
// 4. the 4-bit checksum is correct
// 5. END marker is valid
//
// This prevents a noisy scan from becoming a random ID such as 223.

function getChecksum4(id) {
  return ((((id >> 4) & 15) ^ (id & 15)) & 15);
}

function bitsToNumber(bits) {
  return bits.reduce((value, bit) => (value << 1) | bit, 0);
}

function countPatternErrors(bits, expected) {
  let errors = 0;

  for (let i = 0; i < expected.length; i++) {
    if (bits[i] !== expected[i]) errors++;
  }

  return errors;
}

function decodeV2FromNormalizedHeights(normalizedByPosition) {
  function readBits(positions) {
    return positions.map(position =>
      normalizedByPosition[position] >= BIT_THRESHOLD ? 1 : 0
    );
  }

  const startBits = readBits(START_POS);
  const syncBits  = readBits(SYNC_POS);
  const endBits   = readBits(END_POS);

  // Allow at most one noisy marker bit in start/end, but sync must be exact.
  if (countPatternErrors(startBits, START_PATTERN) > 1) return null;
  if (countPatternErrors(syncBits, SYNC_PATTERN) > 0) return null;
  if (countPatternErrors(endBits, END_PATTERN) > 1) return null;

  const id1 = bitsToNumber(readBits(ID1_POS));
  const id2 = bitsToNumber(readBits(ID2_POS));
  const checksum = bitsToNumber(readBits(CHECK_POS));

  if (id1 !== id2) return null;
  if (id1 < 1 || id1 > 255) return null;
  if (checksum !== getChecksum4(id1)) return null;

  // Compare every encoded height to the expected V2 high/low level.
  // Reject scans that technically pass bits but are visually poor matches.
  let totalError = 0;
  let count = 0;

  const groups = [
    [START_POS, START_PATTERN],
    [SYNC_POS, SYNC_PATTERN],
    [END_POS, END_PATTERN]
  ];

  groups.forEach(([positions, pattern]) => {
    positions.forEach((position, index) => {
      const expected = pattern[index] ? ENC_HIGH : ENC_LOW;
      totalError += Math.abs(normalizedByPosition[position] - expected);
      count++;
    });
  });

  const id1Bits = ID1_POS.map((_, index) => (id1 >> (7 - index)) & 1);
  const id2Bits = ID2_POS.map((_, index) => (id2 >> (7 - index)) & 1);
  const checkBits = CHECK_POS.map((_, index) => (checksum >> (3 - index)) & 1);

  [
    [ID1_POS, id1Bits],
    [ID2_POS, id2Bits],
    [CHECK_POS, checkBits]
  ].forEach(([positions, bits]) => {
    positions.forEach((position, index) => {
      const expected = bits[index] ? ENC_HIGH : ENC_LOW;
      totalError += Math.abs(normalizedByPosition[position] - expected);
      count++;
    });
  });

  const averageError = count ? totalError / count : 1;

  return averageError <= 0.25 ? id1 : null;
}

function measureEncodedHeights(
  pixels,
  imageWidth,
  imageHeight,
  waveX,
  waveY,
  waveW,
  waveH,
  bg,
  darkBackground,
  pixelThreshold
) {
  const barStep = waveW / 100;
  const rawHeights = {};

  ALL_V2_POSITIONS.forEach(position => {
    const centreX = waveX + (position + 0.28) * barStep;
    const nearbyHeights = [];

    [-0.18, 0, 0.18].forEach(offset => {
      const x = Math.max(
        0,
        Math.min(
          imageWidth - 1,
          Math.round(centreX + offset * barStep)
        )
      );

      let top = -1;
      let bottom = -1;

      const startY = Math.max(0, Math.floor(waveY));
      const endY = Math.min(
        imageHeight - 1,
        Math.ceil(waveY + waveH)
      );

      for (let y = startY; y <= endY; y++) {
        const lum = pixelLum(pixels, imageWidth, x, y);

        const active = darkBackground
          ? lum > bg + pixelThreshold
          : lum < bg - pixelThreshold;

        if (active) {
          if (top < 0) top = y;
          bottom = y;
        }
      }

      nearbyHeights.push(
        top < 0 ? 0 : bottom - top + 1
      );
    });

    rawHeights[position] = medianValue(nearbyHeights);
  });

  const maxHeight = Math.max(
    ...Object.values(rawHeights)
  );

  if (!maxHeight || maxHeight <= 1) return null;

  const normalized = {};

  Object.keys(rawHeights).forEach(key => {
    normalized[key] = rawHeights[key] / maxHeight;
  });

  return normalized;
}

// Original PNG exported by creator.html (1050 × 600)
function decodeGeneratedCardImage(ctx, W, H) {
  try {
    const ratio = W / H;

    if (Math.abs(ratio - (1050 / 600)) > 0.12) {
      return null;
    }

    const pixels = ctx.getImageData(0, 0, W, H).data;
    const scaleX = W / 1050;
    const scaleY = H / 600;

    const bgValues = [
      pixelLum(pixels, W, 5, 5),
      pixelLum(pixels, W, W - 6, 5),
      pixelLum(pixels, W, 5, H - 6),
      pixelLum(pixels, W, W - 6, H - 6)
    ];

    const bg = medianValue(bgValues);
    const darkBackground = bg < 128;

    const normalized = measureEncodedHeights(
      pixels,
      W,
      H,
      50 * scaleX,
      90 * scaleY,
      950 * scaleX,
      390 * scaleY,
      bg,
      darkBackground,
      24
    );

    return normalized
      ? decodeV2FromNormalizedHeights(normalized)
      : null;

  } catch (error) {
    console.error('V2 PNG decode error:', error);
    return null;
  }
}

// Camera photo / live video decoder
function decodeIdFromImage(ctx, W, H) {
  try {
    const cropW = Math.floor(W * 0.92);
    const cropH = Math.min(
      Math.floor(cropW * 6 / 16),
      Math.floor(H * 0.58)
    );

    const cropX = Math.floor((W - cropW) / 2);
    const cropY = Math.floor((H - cropH) / 2);

    const imageData = ctx.getImageData(
      cropX,
      cropY,
      cropW,
      cropH
    );

    const pixels = imageData.data;
    const edgeValues = [];

    for (let x = 0; x < cropW; x += 4) {
      edgeValues.push(pixelLum(pixels, cropW, x, 2));
      edgeValues.push(pixelLum(pixels, cropW, x, cropH - 3));
    }

    for (let y = 0; y < cropH; y += 4) {
      edgeValues.push(pixelLum(pixels, cropW, 2, y));
      edgeValues.push(pixelLum(pixels, cropW, cropW - 3, y));
    }

    const bg = medianValue(edgeValues);
    const darkBackground = bg < 128;

    const edgeNoise = medianValue(
      edgeValues.map(value => Math.abs(value - bg))
    );

    const threshold = Math.max(22, edgeNoise * 2.5);

    const yStart = Math.floor(cropH * 0.08);
    const yEnd = Math.floor(cropH * 0.92);

    let activeL = -1;
    let activeR = -1;

    for (let x = 0; x < cropW; x++) {
      let activeCount = 0;

      for (let y = yStart; y < yEnd; y += 2) {
        const lum = pixelLum(pixels, cropW, x, y);

        const active = darkBackground
          ? lum > bg + threshold
          : lum < bg - threshold;

        if (active) activeCount++;
      }

      if (activeCount >= 3) {
        if (activeL < 0) activeL = x;
        activeR = x;
      }
    }

    if (activeL < 0) return null;

    const detectedWidth = activeR - activeL;

    if (detectedWidth < cropW * 0.38) {
      return null;
    }

    activeL += Math.floor(detectedWidth * 0.02);
    activeR -= Math.floor(detectedWidth * 0.02);

    const normalized = measureEncodedHeights(
      pixels,
      cropW,
      cropH,
      activeL,
      yStart,
      activeR - activeL,
      yEnd - yStart,
      bg,
      darkBackground,
      threshold
    );

    return normalized
      ? decodeV2FromNormalizedHeights(normalized)
      : null;

  } catch (error) {
    console.error('V2 camera decode error:', error);
    return null;
  }
}

function pixelLum(pixels, width, x, y) {
  const index = (y * width + x) * 4;

  return (
    pixels[index] * 0.299 +
    pixels[index + 1] * 0.587 +
    pixels[index + 2] * 0.114
  );
}

function medianValue(values) {
  if (!values.length) return 0;

  const sorted = [...values].sort((a, b) => a - b);
  const middle = Math.floor(sorted.length / 2);

  return sorted.length % 2
    ? sorted[middle]
    : (sorted[middle - 1] + sorted[middle]) / 2;
}

// ── External Cross-Origin JSONP Lookup ──
function lookupId(id) {
  setStatus('scanning', 'Checking database for ID ' + id + '…');

  const callbackName = 'soundwaveLookup_' + Date.now();
  const script = document.createElement('script');
  let finished = false;

  function cleanup() {
    if (finished) return;
    finished = true;

    try {
      delete window[callbackName];
    } catch (e) {
      window[callbackName] = undefined;
    }

    if (script.parentNode) {
      script.parentNode.removeChild(script);
    }
  }

  const timeout = setTimeout(function() {
    cleanup();
    setStatus('error', 'Network lookup timed out.');
    scanning = false;
  }, 15000);

  window[callbackName] = function(result) {
    clearTimeout(timeout);
    cleanup();

    if (result && result.found === true) {
      setStatus('found', 'Card found — ID ' + result.id);
      showPlayer(result);
      return;
    }

    const message =
      result && result.error
        ? result.error
        : 'Card not found in database (ID:' + id + ')';

    setStatus('error', message);

    setTimeout(function() {
      failCount = 0;
      lastId = -1;
      scanning = false;
    }, 2500);
  };

  script.onerror = function() {
    clearTimeout(timeout);
    cleanup();
    setStatus('error', 'Network lookup failed.');
    scanning = false;
  };

  script.src =
    APP_WEB_APP_URL +
    '?page=lookup' +
    '&id=' + encodeURIComponent(Number(id)) +
    '&callback=' + encodeURIComponent(callbackName) +
    '&t=' + Date.now();

  document.body.appendChild(script);
}

// ── Player Controls ──
function showPlayer(card) {
  document.getElementById('scanUI').style.display='none';
  document.getElementById('player').style.display='block';
  document.getElementById('pName').textContent = card.name || 'Audio';
  document.getElementById('pDebug').textContent = "Loading file bits...";

  drawPlayerWave();

  audioEl = document.getElementById('nativeAudio');
  audioEl.pause();
  audioEl.src = card.audioUrl;
  audioEl.load();

  audioEl.removeEventListener('loadedmetadata', handleMetadata);
  audioEl.removeEventListener('timeupdate', updateProg);
  audioEl.removeEventListener('ended', handleEnded);
  audioEl.removeEventListener('error', handleAudioStreamError);

  audioEl.addEventListener('loadedmetadata', handleMetadata);
  audioEl.addEventListener('timeupdate', updateProg);
  audioEl.addEventListener('ended', handleEnded);
  audioEl.addEventListener('error', handleAudioStreamError);

  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('pDebug').textContent = 'Tap play to hear the recording.';
}

function handleAudioStreamError() {
  const e = audioEl ? audioEl.error : null;
  const d = document.getElementById('pDebug');
  if (!e) { d.textContent = "Status: Connection dropped."; return; }
  switch (e.code) {
    case 1: d.textContent = "Error: Stream aborted."; break;
    case 2: d.textContent = "Error: File route not found."; break;
    case 3: d.textContent = "Error: Decode crash. Check if url is a webpage."; break;
    case 4: d.textContent = "Error: Format unsupported or host blocked connection."; break;
    default: d.textContent = "Playback blocked. Verify link address.";
  }
}

function handleMetadata() { document.getElementById('tDur').textContent = fmt(audioEl.duration); document.getElementById('pDebug').textContent = ""; }
function handleEnded() { document.getElementById('playBtn').textContent = '▶'; audioEl.currentTime = 0; }

function drawPlayerWave() {
  const c = document.getElementById('pWave'), W = c.offsetWidth*2||600, H=128;
  c.width=W; c.height=H; const ctx=c.getContext('2d');
  ctx.fillStyle='#0e0e0e'; ctx.fillRect(0,0,W,H);
  const N=80, gp=W/N, bw=gp*0.5;
  for(let i=0;i<N;i++){
    const h=Math.max(3,(0.25+0.75*Math.abs(Math.sin(i*0.38)*Math.cos(i*0.11+0.5)))*H*0.84);
    ctx.fillStyle='#c9a84c'; ctx.fillRect(i*gp,(H-h)/2,bw,h);
  }
}

function togglePlay(){
  if(!audioEl) return;
  const btn = document.getElementById('playBtn');
  if (btn.textContent === '▶') {
    btn.textContent = '⏸';
    audioEl.play().catch(e => { btn.textContent = '▶'; handleAudioStreamError(); });
  } else {
    btn.textContent = '▶'; audioEl.pause();
  }
}

function updateProg(){
  if(!audioEl||!audioEl.duration)return;
  document.getElementById('progFill').style.width=(audioEl.currentTime/audioEl.duration*100)+'%';
  document.getElementById('tCur').textContent=fmt(audioEl.currentTime);
}

function seek(e){
  if(!audioEl||!audioEl.duration)return;
  const r=document.getElementById('progWrap').getBoundingClientRect();
  audioEl.currentTime=((e.clientX-r.left)/r.width)*audioEl.duration;
}

function fmt(s){ if(isNaN(s)) return "0:00"; const m=Math.floor(s/60),sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }

function resetScanner(){
  if(audioEl){ audioEl.pause(); }
  document.getElementById('player').style.display='none';
  document.getElementById('scanUI').style.display='block';
  document.getElementById('pDebug').textContent = "";
  lastId=-1; failCount=0; scanning=false;
  startBtn.textContent = "Start Camera"; startBtn.style.background = "var(--gold)"; startBtn.onclick = startCamera;
  scanLine.style.display = 'block'; setStatus('scanning','Scanning…'); startCamera();
}
function setStatus(cls,msg){ status.className=cls; status.textContent=msg; }
</script>
</body>
</html>
